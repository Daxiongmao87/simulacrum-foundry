# CI checks for pull requests
# Runs lint, formatting, and dead code checks on changed files only

name: CI

"on":
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Get changed files
        id: changed
        run: |
          # Get list of changed files compared to the base branch
          CHANGED_JS=$(git diff --name-only --diff-filter=ACMR origin/${{ github.base_ref }}...HEAD -- 'scripts/**/*.js' | tr '\n' ' ')
          CHANGED_ALL=$(git diff --name-only --diff-filter=ACMR origin/${{ github.base_ref }}...HEAD -- 'scripts/**/*.js' '*.json' '*.md' | tr '\n' ' ')

          echo "js_files=$CHANGED_JS" >> $GITHUB_OUTPUT
          echo "all_files=$CHANGED_ALL" >> $GITHUB_OUTPUT

          if [ -z "$CHANGED_JS" ]; then
            echo "has_js=false" >> $GITHUB_OUTPUT
            echo "No JS files changed"
          else
            echo "has_js=true" >> $GITHUB_OUTPUT
            echo "Changed JS files: $CHANGED_JS"
          fi

          if [ -z "$CHANGED_ALL" ]; then
            echo "has_any=false" >> $GITHUB_OUTPUT
            echo "No formattable files changed"
          else
            echo "has_any=true" >> $GITHUB_OUTPUT
            echo "Changed files for formatting: $CHANGED_ALL"
          fi

      - name: ESLint check
        if: steps.changed.outputs.has_js == 'true'
        run: npx eslint ${{ steps.changed.outputs.js_files }}

      - name: Prettier check
        if: steps.changed.outputs.has_any == 'true'
        run: npx prettier --check ${{ steps.changed.outputs.all_files }}

      - name: Dead code check
        if: steps.changed.outputs.has_js == 'true'
        run: npm run dead-code
        continue-on-error: true
