# Announce newly opened issues in Discord

name: Announce New Issue

on:
  issues:
    types: [opened]

permissions: {}

jobs:
  announce:
    name: Send Discord announcement
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Build Discord payload
        env:
          REPOSITORY: ${{ github.repository }}
        run: |
          jq --arg repository "$REPOSITORY" '
            def heading_marker: "\u001e";
            def visible_length: gsub(heading_marker; "") | length;
            def fence_parts:
              capture(
                "^(?<container>(?: {0,3}>[ \t]?)* {0,3})(?<content>.*)$"
              );
            def backtick_fence_prefix:
              if contains("```") then
                fence_parts.content | startswith("```")
              else
                false
              end;
            def tilde_fence_prefix:
              if contains("~~~") then
                fence_parts.content | startswith("~~~")
              else
                false
              end;
            def invalid_backtick_fence_open:
              if backtick_fence_prefix then
                (
                  fence_parts.content
                  | capture("^(?<delimiter>`{3,})(?<info>.*)$")
                )
                | (.info | contains("`"))
              else
                false
              end;
            def fence_open:
              if backtick_fence_prefix then
                invalid_backtick_fence_open | not
              else
                tilde_fence_prefix
              end;
            def fence_close:
              fence_parts.content
              | test("^(?:`{3,}|~{3,})[ \t]*$");
            def fence_delimiter:
              fence_parts.content
              | capture("^(?<delimiter>`{3,}|~{3,})").delimiter;
            def fence_character: fence_delimiter[0:1];
            def fence_length: fence_delimiter | length;
            def valid_fence_close($required_character; $required_length):
              if fence_close then
                (fence_character == $required_character) and
                (fence_length >= $required_length)
              else
                false
              end;
            def repeated_backticks($length):
              [range(0; $length) | "`"] | join("");
            def repeated_spaces($length):
              [range(0; $length) | " "] | join("");
            def blockquote_parts:
              capture(
                "^(?<container>(?: {0,3}>[ \t]?)*)(?<content>.*)$"
              )
              | {
                  container: (.container // ""),
                  content: (.content // "")
                };
            def list_marker_parts:
              blockquote_parts as $parts
              | (
                  $parts.content
                  | if test(
                      "^(?: {0,3})(?:[-+*]|[0-9]{1,9}[.)])[ \t]{1,4}"
                    ) then
                      capture(
                        "^(?<indent> {0,3})(?<marker>(?:[-+*]|[0-9]{1,9}[.)]))(?<spacing>[ \t]{1,4})(?<content>.*)$"
                      )
                    else
                      null
                    end
                ) as $marker
              | if $marker == null then
                  null
                else
                  {
                    blockquote: $parts.container,
                    continuation_length: (
                      ($marker.indent | length) +
                      ($marker.marker | length) +
                      ($marker.spacing | length)
                    ),
                    prefix: (
                      $marker.indent +
                      $marker.marker +
                      $marker.spacing
                    ),
                    content: $marker.content
                  }
                end;
            def list_continuation_fence_line(
              $line;
              $parts;
              $active_indent;
              $active_blockquote
            ):
              if ($active_indent > 0) and
                  ($active_blockquote == ($parts.container // "")) and
                  (
                    ($parts.content // "")
                    | startswith(
                        repeated_spaces($active_indent)
                      )
                  ) then
                {
                  source: $line,
                  detection: (
                    $parts.container +
                    $parts.content[$active_indent:]
                  ),
                  list_prefix: (
                    $parts.content[0:$active_indent]
                  )
                }
              else
                null
              end;
            def list_aware_fence_lines:
              . as $lines
              | if (
                  $lines
                  | join("\n")
                  | test(
                      "(^|\n)(?: {0,3}>[ \t]?)* {0,3}(?:[-+*]|[0-9]{1,9}[.)])[ \t]{1,4}"
                    )
                  | not
                ) then
                  $lines
                  | map({
                      source: .,
                      detection: .,
                      list_prefix: ""
                    })
                else
                  [
                    foreach $lines[] as $line (
                      {
                        list_indent: 0,
                        blockquote: "",
                        in_fence: false,
                        fence_character: "",
                        fence_length: 0,
                        item: null
                      };
                      ($line | blockquote_parts) as $parts
                      | (.list_indent) as $active_indent
                      | (.blockquote // "") as $active_blockquote
                      | if .in_fence then
                          (.fence_character) as $required_character
                          | (.fence_length) as $required_length
                          | (
                              $line
                              | list_continuation_fence_line(
                                  $line;
                                  $parts;
                                  $active_indent;
                                  $active_blockquote
                                )
                            ) as $continued
                          | .item = (
                              $continued
                              // {
                                source: $line,
                                detection: $line,
                                list_prefix: ""
                              }
                            )
                          | if (
                              .item.detection
                              | valid_fence_close(
                                  $required_character;
                                  $required_length
                                )
                            ) then
                              .in_fence = false
                              | .fence_character = ""
                              | .fence_length = 0
                            else
                              .
                            end
                        else
                          ($line | list_marker_parts) as $marker
                          | (
                              $line
                              | list_continuation_fence_line(
                                  $line;
                                  $parts;
                                  $active_indent;
                                  $active_blockquote
                                )
                            ) as $continued
                          | if $marker != null then
                              .list_indent = $marker.continuation_length
                              | .blockquote = $marker.blockquote
                              | .item = {
                                  source: $line,
                                  detection: (
                                    $marker.blockquote +
                                    $marker.content
                                  ),
                                  list_prefix: $marker.prefix
                                }
                            elif $continued != null then
                              .item = $continued
                            elif (($parts.content // "") | test("^[ \t]*$")) then
                              .item = {
                                source: $line,
                                detection: $line,
                                list_prefix: ""
                              }
                            else
                              .list_indent = 0
                              | .blockquote = ""
                              | .item = {
                                  source: $line,
                                  detection: $line,
                                  list_prefix: ""
                                }
                            end
                          | if (.item.detection | fence_open) then
                              .in_fence = true
                              | .fence_character = (
                                  .item.detection
                                  | fence_character
                                )
                              | .fence_length = (
                                  .item.detection
                                  | fence_length
                                )
                            else
                              .
                            end
                        end;
                      .item
                    )
                  ]
                end;
            def discord_fence_line($output_length; $list_prefix):
              fence_parts as $parts
              | if ($parts.content | startswith("~~~")) then
                  (
                    $parts.content
                    | capture("^(?<delimiter>~{3,})(?<suffix>.*)$")
                  ) as $fence
                  | $parts.container +
                    $list_prefix +
                    repeated_backticks($output_length) +
                    (
                      if ($fence.suffix | contains("`")) then
                        ""
                      else
                        $fence.suffix
                      end
                    )
                else
                  .
                end;
            def maximum_backtick_run:
              ([match("`+"; "g").length] | max) // 0;
            def tilde_fence_translations:
              . as $lines
              | ($lines | list_aware_fence_lines) as $fence_lines
              | [
                  foreach range(0; ($lines | length)) as $index (
                    {
                      in_fence: false,
                      fence_character: "",
                      fence_length: 0,
                      open_line: null,
                      max_backticks: 0,
                      completed: null
                    };
                    ($fence_lines[$index]) as $line
                    | .completed = null
                    | ($line.detection | fence_open) as $opens_fence
                    | if .in_fence then
                        (.fence_character) as $required_character
                        | (.fence_length) as $required_length
                        | if $required_character == "~" then
                            .max_backticks = (
                              [
                                .max_backticks,
                                (
                                  $line.detection
                                  | maximum_backtick_run
                                )
                              ]
                              | max
                            )
                          else
                            .
                          end
                        | if (
                            $line.detection
                            | valid_fence_close(
                                $required_character;
                                $required_length
                              )
                          ) then
                            if $required_character == "~" then
                              .completed = {
                                open: .open_line,
                                close: $index,
                                length: (
                                  [
                                    $required_length,
                                    (.max_backticks + 1)
                                  ]
                                  | max
                                )
                              }
                            else
                              .
                            end
                            | .in_fence = false
                            | .fence_character = ""
                            | .fence_length = 0
                            | .open_line = null
                            | .max_backticks = 0
                          else
                            .
                          end
                      elif $opens_fence then
                        .in_fence = true
                        | .fence_character = (
                            $line.detection
                            | fence_character
                          )
                        | .fence_length = (
                            $line.detection
                            | fence_length
                          )
                        | if .fence_character == "~" then
                            .open_line = $index
                            | .max_backticks = 0
                          else
                            .open_line = null
                          end
                      else
                        .
                      end;
                    if .completed == null then
                      empty
                    else
                      {
                        key: (.completed.open | tostring),
                        value: .completed.length
                      },
                      {
                        key: (.completed.close | tostring),
                        value: .completed.length
                      }
                    end
                  )
                ]
              | from_entries;
            def mask_escaped_markdown:
              . as $content
              | [
                  foreach ($content | explode[]) as $char (
                    {backslashes: 0, output: 0};
                    if (
                      (
                        [40, 41, 42, 60, 62, 91, 93, 95, 96, 126]
                        | index($char)
                      ) != null and
                      ((.backslashes % 2) == 1)
                    ) then
                      .output = 32
                      | .backslashes = 0
                    else
                      .output = $char
                      | if $char == 92 then
                          .backslashes += 1
                        else
                          .backslashes = 0
                        end
                    end;
                    .output
                  )
                ]
              | implode;
            def mask_fenced_ticks:
              if (contains("```") or contains("~~~")) | not then
                if contains("\\") then mask_escaped_markdown else . end
              else
                split("\n")
                | list_aware_fence_lines
                | [
                    foreach .[] as $line (
                      {
                        in_fence: false,
                        fence_character: "",
                        fence_length: 0,
                        output: ""
                      };
                      ($line.detection | fence_open) as $opens_fence
                      | if .in_fence then
                          (.fence_character) as $required_character
                          | (.fence_length) as $required_length
                          | .output = (
                              $line.source
                              | gsub("."; " ")
                            )
                          | if (
                              $line.detection
                              | valid_fence_close(
                                  $required_character;
                                  $required_length
                                )
                            ) then
                              .in_fence = false
                              | .fence_character = ""
                              | .fence_length = 0
                            else
                              .
                            end
                        elif $opens_fence then
                          .output = (
                            $line.source
                            | gsub("."; " ")
                          )
                          | .in_fence = true
                          | .fence_character = (
                              $line.detection
                              | fence_character
                            )
                          | .fence_length = (
                              $line.detection
                              | fence_length
                            )
                        else
                          .output = (
                            if $line.source | contains("\\") then
                              $line.source
                              | mask_escaped_markdown
                            else
                              $line.source
                            end
                          )
                        end;
                      .output
                    )
                  ]
                | join("\n")
              end;
            def inline_code_ranges:
              [match("`+"; "g")] as $runs
              | (
                  reduce $runs[] as $run (
                    {};
                    ($run.length | tostring) as $key
                    | .[$key] = ((.[$key] // 0) + 1)
                  )
                ) as $counts
              | [
                  foreach $runs[] as $run (
                    {
                      remaining: $counts,
                      open: null,
                      completed: null
                    };
                    ($run.length | tostring) as $key
                    | .remaining[$key] -= 1
                    | .completed = null
                    | if .open != null then
                        if $run.length == .open.length then
                          .completed = {
                            start: .open.offset,
                            end: ($run.offset + $run.length)
                          }
                          | .open = null
                        else
                          .
                        end
                      elif .remaining[$key] > 0 then
                        .open = $run
                      else
                        .
                      end;
                    select(.completed != null) | .completed
                  )
                ];
            def completed_inline_code_mask:
              . as $content
              | (
                  $content
                  | mask_fenced_ticks
                  | inline_code_ranges
                ) as $ranges
              | if ($ranges | length) == 0 then
                  null
                else
                  ($content | explode) as $chars
                  | [
                      foreach range(0; ($chars | length)) as $index (
                        {range_index: 0};
                        until(
                          (.range_index >= ($ranges | length)) or
                            ($index < $ranges[.range_index].end);
                          .range_index += 1
                        );
                        if $chars[$index] == 10 then
                          10
                        elif (
                          (.range_index < ($ranges | length)) and
                          ($index >= $ranges[.range_index].start) and
                          ($index < $ranges[.range_index].end)
                        ) then
                          120
                        else
                          32
                        end
                      )
                    ]
                  | implode
                end;
            def collapsed_horizontal_whitespace:
              gsub("[ \t]+"; " ");
            def normalize_protected_whitespace($mask):
              . as $content
              | if ($mask | contains("x") | not) then
                  $content
                  | collapsed_horizontal_whitespace
                  | sub(" +$"; "")
                else
                  [$mask | match("x+"; "g")] as $ranges
                  | (
                      [
                        range(0; ($ranges | length)) as $index
                        | (
                            if $index == 0 then
                              0
                            else
                              $ranges[($index - 1)].offset +
                              $ranges[($index - 1)].length
                            end
                          ) as $cursor
                        | (
                            (
                              $content[$cursor:$ranges[$index].offset]
                              | collapsed_horizontal_whitespace
                            ),
                            $content[$ranges[$index].offset:(
                              $ranges[$index].offset +
                              $ranges[$index].length
                            )]
                          )
                      ] +
                      [
                        (
                          $content[(
                            $ranges[-1].offset +
                            $ranges[-1].length
                          ):]
                          | collapsed_horizontal_whitespace
                        )
                      ]
                    )
                    | join("")
                    | sub(" +$"; "")
                end;
            def normalized_line($convert_heading; $code_mask):
              if . == "" then
                ""
              elif (contains(" ") or contains("\t")) and test("^[ \t]*$") then
                ""
              elif startswith("    ") or startswith("\t") then
                .
              else
                (
                  if startswith(" ") or startswith("\t") then
                    capture("^(?<indent>[ \t]*)(?<content>.*)$")
                  else
                    {indent: "", content: .}
                  end
                ) as $line
                | (
                    $code_mask[($line.indent | length):]
                    // ""
                  ) as $content_mask
                | (
                    $line.content
                    | if (contains(" ") or contains("\t")) | not then
                        .
                      elif $content_mask | contains("x") then
                        normalize_protected_whitespace($content_mask)
                      else
                        collapsed_horizontal_whitespace
                        | sub(" +$"; "")
                      end
                  ) as $content
                | if $convert_heading and
                    ($content_mask | startswith("x") | not) and
                    ($content | test("^#{1,6}( |$)")) then
                    (
                      $content
                      | sub("^#{1,6} *"; "")
                      | sub(" +#+$"; "")
                    ) as $heading
                    | if ($heading | length) == 0 then
                        ""
                      else
                        $line.indent + heading_marker + "**" + $heading + "**"
                      end
                  else
                    $line.indent + $content
                  end
              end;
            def normalized:
              gsub("\r\n"; "\n")
              | gsub("\r"; "\n") as $content
              | ($content | split("\n")) as $lines
              | ($lines | list_aware_fence_lines) as $fence_lines
              | ($lines | tilde_fence_translations) as $tilde_translations
              | (
                  $content
                  | if contains("`") then
                      completed_inline_code_mask
                    else
                      null
                    end
                ) as $code_mask
              | (
                  if $code_mask == null then
                    []
                  else
                    $code_mask | split("\n")
                  end
                ) as $code_masks
              | [
                  foreach range(0; ($lines | length)) as $index (
                    {
                      in_fence: false,
                      fence_character: "",
                      fence_length: 0,
                      blank_count: 0,
                      emit: false,
                      output: ""
                    };
                    ($fence_lines[$index]) as $fence_line
                    | ($fence_line.source) as $line
                    | (
                        $tilde_translations[($index | tostring)]
                        // null
                      ) as $translation_length
                    | .emit = false
                    | (
                        $fence_line.detection
                        | fence_open
                      ) as $opens_fence
                    | if .in_fence then
                        (.fence_character) as $required_character
                        | (.fence_length) as $required_length
                        | (
                            $fence_line.detection
                            | valid_fence_close(
                                $required_character;
                                $required_length
                              )
                          ) as $closes_fence
                        | .output = (
                            if $required_character == "~" and
                                $closes_fence and
                                ($translation_length != null) then
                              $fence_line.detection
                              | discord_fence_line(
                                  $translation_length;
                                  $fence_line.list_prefix
                                )
                            else
                              $line
                            end
                          )
                        | .emit = true
                        | .blank_count = 0
                        | if $closes_fence then
                            .in_fence = false
                            | .fence_character = ""
                            | .fence_length = 0
                          else
                            .
                          end
                      elif $opens_fence then
                        .output = (
                          if (
                            $fence_line.detection
                            | fence_character
                          ) == "~" and
                              ($translation_length != null) then
                            $fence_line.detection
                            | discord_fence_line(
                                $translation_length;
                                $fence_line.list_prefix
                              )
                          else
                            $line
                          end
                        )
                        | .emit = true
                        | .in_fence = true
                        | .fence_character = (
                            $fence_line.detection
                            | fence_character
                          )
                        | .fence_length = (
                            $fence_line.detection
                            | fence_length
                          )
                        | .blank_count = 0
                      else
                        (
                          $line
                          | normalized_line(
                              true;
                              ($code_masks[$index] // "")
                            )
                        ) as $normalized
                        | if $normalized == "" then
                            if .blank_count == 0 then
                              .output = ""
                              | .emit = true
                              | .blank_count = 1
                            else
                              .
                            end
                          else
                            .output = $normalized
                            | .emit = true
                            | .blank_count = 0
                          end
                      end;
                    select(.emit) | .output
                  )
                ]
              | join("\n")
              | sub("^\n+"; "")
              | sub("\n+$"; "");
            def complete_paragraphs($limit):
              split("\n\n")
              | reduce .[] as $paragraph (
                  {text: "", accepting: true};
                  if (.accepting | not) then
                    .
                  else
                    (
                      if .text == "" then
                        $paragraph
                      else
                        .text + "\n\n" + $paragraph
                      end
                    ) as $candidate
                    | if ($candidate | visible_length) <= $limit then
                        .text = $candidate
                      else
                        .accepting = false
                      end
                  end
                )
              | .text;
            def without_trailing_heading:
              split("\n\n") as $paragraphs
              | if ($paragraphs | length) == 0 then
                  .
                elif (
                  ($paragraphs[-1] | startswith(heading_marker)) and
                  ($paragraphs[-1] | contains("\n") | not)
                ) then
                  $paragraphs[0:-1] | join("\n\n")
                else
                  .
                end;
            def visible_slice($limit):
              explode
              | reduce .[] as $char (
                  {chars: [], visible: 0, accepting: true};
                  if (.accepting | not) then
                    .
                  elif $char == 30 then
                    .chars += [$char]
                  elif .visible < $limit then
                    .chars += [$char]
                    | .visible += 1
                  else
                    .accepting = false
                  end
                )
              | .chars
              | implode;
            def word_prefix($limit):
              visible_slice($limit) as $slice
              | (($slice | rindex(" ")) // -1) as $space
              | (($slice | rindex("\n")) // -1) as $newline
              | ([$space, $newline] | max) as $cut
              | if $cut > 0 then $slice[0:$cut] else $slice end;
            def without_unclosed_fence:
              split("\n")
              | list_aware_fence_lines
              | reduce .[] as $line (
                  {
                    lines: [],
                    in_fence: false,
                    fence_character: "",
                    fence_length: 0,
                    fence_start: 0
                  };
                  ($line.detection | fence_open) as $opens_fence
                  | if .in_fence then
                      (.fence_character) as $required_character
                      | (.fence_length) as $required_length
                      | .lines += [$line.source]
                      | if (
                          $line.detection
                          | valid_fence_close(
                              $required_character;
                              $required_length
                            )
                        ) then
                          .in_fence = false
                          | .fence_character = ""
                          | .fence_length = 0
                        else
                          .
                        end
                    elif $opens_fence then
                      .fence_start = (.lines | length)
                      | .lines += [$line.source]
                      | .in_fence = true
                      | .fence_character = (
                          $line.detection
                          | fence_character
                        )
                      | .fence_length = (
                          $line.detection
                          | fence_length
                        )
                    else
                      .lines += [$line.source]
                    end
                )
              | if .in_fence then .lines[0:.fence_start] else .lines end
              | join("\n");
            def mask_completed_inline_code:
              if (
                contains("`") or
                contains("~") or
                contains("\\")
              ) | not then
                .
              else
                . as $content
                | ($content | mask_fenced_ticks) as $analysis
                | ($analysis | inline_code_ranges) as $ranges
                | if ($ranges | length) == 0 then
                    $analysis
                  else
                    ($analysis | explode) as $chars
                    | [
                        foreach range(0; ($chars | length)) as $index (
                          {range_index: 0};
                          until(
                            (.range_index >= ($ranges | length)) or
                              ($index < $ranges[.range_index].end);
                            .range_index += 1
                          );
                          if (
                            (.range_index < ($ranges | length)) and
                            ($index >= $ranges[.range_index].start) and
                            ($index < $ranges[.range_index].end)
                          ) then
                            32
                          else
                            $chars[$index]
                          end
                        )
                      ]
                    | implode
                  end
              end;
            def crossed_inline_code_opener($prefix_length):
              inline_code_ranges
              | map(
                  select(
                    (.start < $prefix_length) and
                      (.end > $prefix_length)
                  )
                )
              | if length == 0 then null else .[0].start end;
            def without_unclosed_inline_code($full_content):
              . as $content
              | if ($full_content | contains("`") | not) then
                  $content
                else
                  ($content | length) as $prefix_length
                  | (
                      $full_content
                      | mask_fenced_ticks
                      | crossed_inline_code_opener($prefix_length)
                    ) as $open
                  | if $open == null then $content else $content[0:$open] end
                end;
            def character_at($chars; $index):
              if ($index < 0) or ($index >= ($chars | length)) then
                ""
              else
                [$chars[$index]] | implode
              end;
            def whitespace_or_boundary:
              (. == "") or test("^[[:space:]]$");
            def punctuation_character:
              (. != "") and test("^[[:punct:]]$");
            def single_underscore_delimiters:
              (. | explode) as $chars
              | [
                  range(0; ($chars | length)) as $index
                  | select($chars[$index] == 95)
                  | select(
                      (
                        (($index > 0) and ($chars[($index - 1)] == 95)) or
                        (
                          ($index + 1 < ($chars | length)) and
                          ($chars[($index + 1)] == 95)
                        )
                      )
                      | not
                    )
                  | (character_at($chars; ($index - 1))) as $previous
                  | (character_at($chars; ($index + 1))) as $next
                  | ($previous | whitespace_or_boundary) as $previous_whitespace
                  | ($next | whitespace_or_boundary) as $next_whitespace
                  | ($previous | punctuation_character) as $previous_punctuation
                  | ($next | punctuation_character) as $next_punctuation
                  | (
                      ($next_whitespace | not) and
                      (
                        ($next_punctuation | not) or
                        $previous_whitespace or
                        $previous_punctuation
                      )
                    ) as $left_flanking
                  | (
                      ($previous_whitespace | not) and
                      (
                        ($previous_punctuation | not) or
                        $next_whitespace or
                        $next_punctuation
                      )
                    ) as $right_flanking
                  | {
                      offset: $index,
                      can_open: (
                        $left_flanking and
                        (($right_flanking | not) or $previous_punctuation)
                      ),
                      can_close: (
                        $right_flanking and
                        (($left_flanking | not) or $next_punctuation)
                      )
                    }
                  | select(.can_open or .can_close)
                ];
            def crossed_single_underscore_opener($prefix_length):
              reduce (single_underscore_delimiters[]) as $delimiter (
                {open: null, crossed: null};
                if .crossed != null then
                  .
                elif $delimiter.can_close and (.open != null) then
                  (.open) as $open
                  | .open = null
                  | if ($open < $prefix_length) and
                      ($delimiter.offset >= $prefix_length) then
                      .crossed = $open
                    else
                      .
                    end
                elif $delimiter.can_open then
                  .open = $delimiter.offset
                else
                  .
                end
              )
              | .crossed;
            def asterisk_delimiters:
              (. | explode) as $chars
              | [
                  match("\\*+"; "g")
                  | . as $run
                  | (character_at($chars; ($run.offset - 1))) as $previous
                  | (
                      character_at(
                        $chars;
                        ($run.offset + $run.length)
                      )
                    ) as $next
                  | ($previous | whitespace_or_boundary) as $previous_whitespace
                  | ($next | whitespace_or_boundary) as $next_whitespace
                  | ($previous | punctuation_character) as $previous_punctuation
                  | ($next | punctuation_character) as $next_punctuation
                  | (
                      ($next_whitespace | not) and
                      (
                        ($next_punctuation | not) or
                        $previous_whitespace or
                        $previous_punctuation
                      )
                    ) as $left_flanking
                  | (
                      ($previous_whitespace | not) and
                      (
                        ($previous_punctuation | not) or
                        $next_whitespace or
                        $next_punctuation
                      )
                    ) as $right_flanking
                  | {
                      offset: $run.offset,
                      length: $run.length,
                      can_open: $left_flanking,
                      can_close: $right_flanking
                    }
                  | select(.can_open or .can_close)
                ];
            def crossed_asterisk_opener($delimiters; $required_length; $prefix_length):
              reduce (
                $delimiters[]
                | select(.length == $required_length)
              ) as $delimiter (
                {open: null, crossed: null};
                if .crossed != null then
                  .
                elif $delimiter.can_close and (.open != null) then
                  (.open) as $open
                  | .open = null
                  | if ($open < $prefix_length) and
                      ($delimiter.offset >= $prefix_length) then
                      .crossed = $open
                    else
                      .
                    end
                elif $delimiter.can_open then
                  .open = $delimiter.offset
                else
                  .
                end
              )
              | if .crossed == null then
                  null
                else
                  {
                    offset: .crossed,
                    length: $required_length
                  }
                end;
            def remove_at($index; $size):
              .[0:$index] + .[($index + $size):];
            def without_unclosed_single_underscore($full_content):
              . as $content
              | if ($full_content | contains("_") | not) then
                  $content
                else
                  ($content | length) as $prefix_length
                  | (
                      $full_content
                      | mask_completed_inline_code
                      | crossed_single_underscore_opener($prefix_length)
                    ) as $opener
                  | if $opener == null then
                      $content
                    else
                      $content | remove_at($opener; 1)
                    end
                end;
            def without_unclosed_asterisks($full_content):
              . as $content
              | if ($full_content | contains("*") | not) then
                  $content
                else
                  ($content | length) as $prefix_length
                  | ($full_content | mask_completed_inline_code) as $markdown
                  | ($markdown | asterisk_delimiters) as $delimiters
                  | [
                      ($delimiters | map(.length) | unique[]) as $required_length
                      | crossed_asterisk_opener(
                          $delimiters;
                          $required_length;
                          $prefix_length
                        )
                      | select(. != null)
                    ] as $openers
                  | reduce (
                      $openers
                      | sort_by(.offset)
                      | reverse
                      | .[]
                    ) as $opener (
                      $content;
                      remove_at(
                        $opener.offset;
                        $opener.length
                      )
                    )
                end;
            def without_unclosed_marker($marker; $full_content):
              . as $content
              | if ($full_content | contains($marker) | not) then
                  $content
                else
                  ($content | mask_completed_inline_code) as $markdown
                  | ($full_content | mask_completed_inline_code) as $full_markdown
                  | (($markdown | split($marker) | length) - 1) as $count
                  | (($full_markdown | split($marker) | length) - 1) as $full_count
                  | if (($count % 2) == 1) and ($full_count > $count) then
                      (($markdown | rindex($marker)) // ($content | length)) as $index
                      | $content | remove_at($index; ($marker | length))
                    else
                      $content
                    end
                end;
            def matching_parenthesis_close($open):
              (. | explode) as $chars
              | reduce range(($open + 1); ($chars | length)) as $index (
                  {depth: 1, close: null};
                  if .close != null then
                    .
                  elif $chars[$index] == 40 then
                    .depth += 1
                  elif $chars[$index] == 41 then
                    .depth -= 1
                    | if .depth == 0 then .close = $index else . end
                  else
                    .
                  end
                )
              | .close;
            def unmatched_bracket_openers:
              (. | explode) as $chars
              | reduce range(0; ($chars | length)) as $index (
                  {stack: []};
                  if $chars[$index] == 91 then
                    .stack += [$index]
                  elif ($chars[$index] == 93) and
                      ((.stack | length) > 0) then
                    .stack = .stack[0:-1]
                  else
                    .
                  end
                )
              | .stack;
            def bracket_pair_indexes:
              (. | explode) as $chars
              | reduce range(0; ($chars | length)) as $index (
                  {
                    stack: [],
                    closes: {},
                    opens: {}
                  };
                  if $chars[$index] == 91 then
                    .stack += [$index]
                  elif ($chars[$index] == 93) and
                      ((.stack | length) > 0) then
                    (.stack[-1]) as $open
                    | .stack = .stack[0:-1]
                    | .closes[($open | tostring)] = $index
                    | .opens[($index | tostring)] = $open
                  else
                    .
                  end
                )
              | del(.stack);
            def without_unclosed_link($full_content):
              . as $content
              | if ($full_content | contains("[") | not) then
                  $content
                else
                  ($content | mask_completed_inline_code) as $markdown
                  | ($full_content | mask_completed_inline_code) as $full_markdown
                  | ($full_markdown | explode) as $full_chars
                  | ($full_markdown | bracket_pair_indexes) as $brackets
                  | ($markdown | unmatched_bracket_openers) as $label_openers
                  | [
                      $label_openers[] as $label_open
                      | (
                          $brackets.closes[($label_open | tostring)]
                        ) as $label_close
                      | select(
                          ($label_close != null) and
                          ($label_close >= ($content | length)) and
                          (
                            $full_chars[($label_close + 1)]
                            == 40
                          )
                        )
                      | {
                          open: $label_open,
                          close: $label_close
                        }
                    ] as $crossed_labels
                  | if ($crossed_labels | length) > 0 then
                      $content[0:$crossed_labels[0].open]
                    else
                      (($markdown | rindex("](")) // -1) as $destination_open
                      | if $destination_open >= 0 then
                          (
                            $brackets.opens[($destination_open | tostring)]
                          ) as $link_open
                          | (
                              $full_markdown
                              | matching_parenthesis_close(
                                  ($destination_open + 1)
                                )
                            ) as $destination_close
                          | if ($link_open != null) and
                              ($destination_close != null) and
                              ($destination_close >= ($content | length)) then
                              $content[0:$link_open]
                            else
                              $content
                            end
                        else
                          $content
                        end
                    end
                end;
            def without_unclosed_autolink($full_content):
              . as $content
              | if ($full_content | contains("<") | not) then
                  $content
                else
                  ($content | mask_completed_inline_code) as $markdown
                  | ($full_content | mask_completed_inline_code) as $full_markdown
                  | "<(?:[A-Za-z][A-Za-z0-9+.-]{1,31}:[^ <>]*|[^ <>@]+@[^ <>]*|/?[A-Za-z][A-Za-z0-9-]*[ \t]+[^>]*|/[A-Za-z][A-Za-z0-9-]*|!--[^>]*)$" as $opener
                  | if ($markdown | test($opener)) then
                      ($markdown | match($opener).offset) as $open
                      | (($full_markdown[$open:] | index(">")) // -1) as $future_close
                      | if $future_close > 0 then $content[0:$open] else $content end
                    else
                      $content
                    end
                end;
            def non_code_safe($full_content):
              without_unclosed_link($full_content)
              | without_unclosed_autolink($full_content)
              | without_unclosed_single_underscore($full_content)
              | without_unclosed_asterisks($full_content)
              | without_unclosed_marker("__"; $full_content)
              | without_unclosed_marker("~~"; $full_content)
              | sub("[ \n]+$"; "");
            def with_ellipsis:
              if (
                split("\n")
                | list_aware_fence_lines
                | if length == 0 then
                    false
                  else
                    .[-1].detection
                    | fence_close
                  end
              ) then
                . + "\n..."
              else
                (sub("\\.+$"; "")) + "..."
              end;
            def markdown_safe($full_content):
              without_unclosed_fence
              | without_unclosed_inline_code($full_content)
              | sub("[ \n]+$"; "");
            def word_or_paragraph_prefix($body; $limit):
              (
                $body
                | complete_paragraphs($limit)
                | without_trailing_heading
                | markdown_safe($body)
              ) as $paragraphs
              | if ($paragraphs | length) > 0 then
                  $paragraphs
                else
                  $body
                  | word_prefix($limit)
                  | markdown_safe($body)
                  | non_code_safe($body)
                end;
            def bounded($limit):
              . as $body
              | if ($body | visible_length) <= $limit then
                  $body
                else
                  ($limit - 4) as $content_limit
                  | word_or_paragraph_prefix($body; $content_limit) as $prefix
                  | if ($prefix | length) > 0 then
                      $prefix | with_ellipsis
                    else
                      "..."
                    end
                end;
            def summary:
              (. // "" | normalized) as $body
              | if ($body | length) == 0 then
                  "_No description provided._"
                else
                  $body | bounded(700) | gsub(heading_marker; "")
                end;
            {
              username: "GitHub Issues",
              allowed_mentions: {parse: []},
              embeds: [{
                title: (
                  .issue.title
                  | if length > 256 then .[0:253] + "..." else . end
                ),
                url: .issue.html_url,
                description: (.issue.body | summary),
                color: 5814783,
                author: {
                  name: ("Opened by @" + .issue.user.login),
                  url: .issue.user.html_url,
                  icon_url: .issue.user.avatar_url
                },
                fields: [{
                  name: "Issue",
                  value: (
                    "[Open issue #" + (.issue.number | tostring) + "](" +
                    .issue.html_url + ")"
                  ),
                  inline: false
                }],
                footer: {text: $repository}
              }]
            }
          ' "$GITHUB_EVENT_PATH" > discord-payload.json

      - name: Send Discord announcement
        env:
          DISCORD_ISSUE_WEBHOOK_URL: ${{ secrets.DISCORD_ISSUE_WEBHOOK_URL }}
        run: |
          if [ -z "$DISCORD_ISSUE_WEBHOOK_URL" ]; then
            echo "::error::DISCORD_ISSUE_WEBHOOK_URL is not configured"
            exit 1
          fi

          curl --fail-with-body --silent --show-error \
            --header 'Content-Type: application/json' \
            --data-binary @discord-payload.json \
            "$DISCORD_ISSUE_WEBHOOK_URL"
