# Announce newly opened issues in Discord

name: Announce New Issue

on:
  issues:
    types: [opened]

permissions: {}

jobs:
  announce:
    name: Send Discord announcement
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Build Discord payload
        env:
          REPOSITORY: ${{ github.repository }}
        run: |
          jq --arg repository "$REPOSITORY" '
            def heading_marker: "\u001e";
            def fence_line: test("^[ \t]*```");
            def normalized_line($convert_heading):
              gsub("[ \t]+"; " ")
              | sub("^ +"; "")
              | sub(" +$"; "")
              | if $convert_heading and test("^#{1,6}( |$)") then
                  sub("^#{1,6} *"; "")
                  | sub(" +#+$"; "")
                  | if length == 0 then
                      ""
                    else
                      heading_marker + "**" + . + "**"
                    end
                else
                  .
                end;
            def normalized:
              gsub("\r\n"; "\n")
              | gsub("\r"; "\n")
              | split("\n")
              | reduce .[] as $line (
                  {lines: [], in_fence: false};
                  ($line | fence_line) as $is_fence
                  | if .in_fence then
                      .lines += [($line | normalized_line(false))]
                      | if $is_fence then .in_fence = false else . end
                    elif $is_fence then
                      .lines += [($line | normalized_line(false))]
                      | .in_fence = true
                    else
                      .lines += [($line | normalized_line(true))]
                    end
                )
              | .lines
              | join("\n")
              | gsub("\n{3,}"; "\n\n")
              | sub("^\n+"; "")
              | sub("\n+$"; "");
            def complete_paragraphs($limit):
              split("\n\n")
              | reduce .[] as $paragraph (
                  {text: "", accepting: true};
                  if (.accepting | not) then
                    .
                  else
                    (
                      if .text == "" then
                        $paragraph
                      else
                        .text + "\n\n" + $paragraph
                      end
                    ) as $candidate
                    | if ($candidate | length) <= $limit then
                        .text = $candidate
                      else
                        .accepting = false
                      end
                  end
                )
              | .text;
            def without_trailing_heading:
              split("\n\n") as $paragraphs
              | if ($paragraphs | length) == 0 then
                  .
                elif (
                  ($paragraphs[-1] | startswith(heading_marker)) and
                  ($paragraphs[-1] | contains("\n") | not)
                ) then
                  $paragraphs[0:-1] | join("\n\n")
                else
                  .
                end;
            def word_prefix($limit):
              .[0:$limit] as $slice
              | (($slice | rindex(" ")) // -1) as $space
              | (($slice | rindex("\n")) // -1) as $newline
              | ([$space, $newline] | max) as $cut
              | if $cut > 0 then $slice[0:$cut] else $slice end;
            def without_unclosed_fence:
              ([scan("```")] | length) as $fences
              | if ($fences % 2) == 1 then
                  (rindex("```") // length) as $cut
                  | .[0:$cut]
                else
                  .
                end;
            def mask_fenced_ticks:
              split("\n")
              | reduce .[] as $line (
                  {lines: [], in_fence: false};
                  ($line | fence_line) as $is_fence
                  | if .in_fence then
                      .lines += [($line | gsub("`"; " "))]
                      | if $is_fence then .in_fence = false else . end
                    elif $is_fence then
                      .lines += [($line | gsub("`"; " "))]
                      | .in_fence = true
                    else
                      .lines += [$line]
                    end
                )
              | .lines
              | join("\n");
            def without_unclosed_inline_code:
              . as $content
              | ($content | mask_fenced_ticks) as $inline_content
              | ($inline_content | [scan("`")] | length) as $ticks
              | if ($ticks % 2) == 1 then
                  (($inline_content | rindex("`")) // ($content | length)) as $cut
                  | $content[0:$cut]
                else
                  $content
                end;
            def markdown_safe:
              without_unclosed_fence
              | without_unclosed_inline_code
              | sub("[ \n]+$"; "");
            def word_or_paragraph_prefix($body; $limit):
              (
                $body
                | complete_paragraphs($limit)
                | without_trailing_heading
                | markdown_safe
              ) as $paragraphs
              | if ($paragraphs | length) > 0 then
                  $paragraphs
                else
                  $body | word_prefix($limit) | markdown_safe
                end;
            def bounded($limit):
              . as $body
              | if ($body | length) <= $limit then
                  $body
                else
                  ($limit - 3) as $content_limit
                  | word_or_paragraph_prefix($body; $content_limit) as $prefix
                  | if ($prefix | length) > 0 then
                      ($prefix | sub("\\.+$"; "")) + "..."
                    else
                      "..."
                    end
                end;
            def summary:
              (. // "" | normalized) as $body
              | if ($body | length) == 0 then
                  "_No description provided._"
                else
                  $body | bounded(700) | gsub(heading_marker; "")
                end;
            {
              username: "GitHub Issues",
              allowed_mentions: {parse: []},
              embeds: [{
                title: (
                  .issue.title
                  | if length > 256 then .[0:253] + "..." else . end
                ),
                url: .issue.html_url,
                description: (.issue.body | summary),
                color: 5814783,
                author: {
                  name: ("Opened by @" + .issue.user.login),
                  url: .issue.user.html_url,
                  icon_url: .issue.user.avatar_url
                },
                fields: [{
                  name: "Issue",
                  value: (
                    "[Open issue #" + (.issue.number | tostring) + "](" +
                    .issue.html_url + ")"
                  ),
                  inline: false
                }],
                footer: {text: $repository}
              }]
            }
          ' "$GITHUB_EVENT_PATH" > discord-payload.json

      - name: Send Discord announcement
        env:
          DISCORD_ISSUE_WEBHOOK_URL: ${{ secrets.DISCORD_ISSUE_WEBHOOK_URL }}
        run: |
          if [ -z "$DISCORD_ISSUE_WEBHOOK_URL" ]; then
            echo "::error::DISCORD_ISSUE_WEBHOOK_URL is not configured"
            exit 1
          fi

          curl --fail-with-body --silent --show-error \
            --header 'Content-Type: application/json' \
            --data-binary @discord-payload.json \
            "$DISCORD_ISSUE_WEBHOOK_URL"
