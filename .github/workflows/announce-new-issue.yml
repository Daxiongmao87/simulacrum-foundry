# Announce newly opened issues in Discord

name: Announce New Issue

on:
  issues:
    types: [opened]

permissions: {}

jobs:
  announce:
    name: Send Discord announcement
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Build Discord payload
        env:
          REPOSITORY: ${{ github.repository }}
        run: |
          jq --arg repository "$REPOSITORY" '
            def heading_marker: "\u001e";
            def fence_line: test("^[ \t]*```");
            def normalized_line($convert_heading):
              if test("^[ \t]*$") then
                ""
              elif test("^(    |\t)") then
                .
              else
                capture("^(?<indent>[ \t]*)(?<content>.*)$") as $line
                | (
                    $line.content
                    | gsub("[ \t]+"; " ")
                    | sub(" +$"; "")
                  ) as $content
                | if $convert_heading and ($content | test("^#{1,6}( |$)")) then
                    (
                      $content
                      | sub("^#{1,6} *"; "")
                      | sub(" +#+$"; "")
                    ) as $heading
                    | if ($heading | length) == 0 then
                        ""
                      else
                        heading_marker + "**" + $heading + "**"
                      end
                  else
                    $line.indent + $content
                  end
              end;
            def normalized:
              gsub("\r\n"; "\n")
              | gsub("\r"; "\n")
              | split("\n")
              | reduce .[] as $line (
                  {lines: [], in_fence: false, blank_count: 0};
                  ($line | fence_line) as $is_fence
                  | if .in_fence then
                      .lines += [$line]
                      | .blank_count = 0
                      | if $is_fence then .in_fence = false else . end
                    elif $is_fence then
                      .lines += [$line]
                      | .in_fence = true
                      | .blank_count = 0
                    else
                      ($line | normalized_line(true)) as $normalized
                      | if $normalized == "" then
                          if .blank_count == 0 then
                            .lines += [""]
                            | .blank_count = 1
                          else
                            .
                          end
                        else
                          .lines += [$normalized]
                          | .blank_count = 0
                        end
                    end
                )
              | .lines
              | join("\n")
              | sub("^\n+"; "")
              | sub("\n+$"; "");
            def complete_paragraphs($limit):
              split("\n\n")
              | reduce .[] as $paragraph (
                  {text: "", accepting: true};
                  if (.accepting | not) then
                    .
                  else
                    (
                      if .text == "" then
                        $paragraph
                      else
                        .text + "\n\n" + $paragraph
                      end
                    ) as $candidate
                    | if ($candidate | length) <= $limit then
                        .text = $candidate
                      else
                        .accepting = false
                      end
                  end
                )
              | .text;
            def without_trailing_heading:
              split("\n\n") as $paragraphs
              | if ($paragraphs | length) == 0 then
                  .
                elif (
                  ($paragraphs[-1] | startswith(heading_marker)) and
                  ($paragraphs[-1] | contains("\n") | not)
                ) then
                  $paragraphs[0:-1] | join("\n\n")
                else
                  .
                end;
            def word_prefix($limit):
              .[0:$limit] as $slice
              | (($slice | rindex(" ")) // -1) as $space
              | (($slice | rindex("\n")) // -1) as $newline
              | ([$space, $newline] | max) as $cut
              | if $cut > 0 then $slice[0:$cut] else $slice end;
            def without_unclosed_fence:
              ([scan("```")] | length) as $fences
              | if ($fences % 2) == 1 then
                  (rindex("```") // length) as $cut
                  | .[0:$cut]
                else
                  .
                end;
            def mask_escaped_ticks:
              explode
              | reduce .[] as $char (
                  {chars: [], backslashes: 0};
                  if $char == 96 then
                    if (.backslashes % 2) == 1 then
                      .chars += [32]
                    else
                      .chars += [$char]
                    end
                    | .backslashes = 0
                  else
                    .chars += [$char]
                    | if $char == 92 then
                        .backslashes += 1
                      else
                        .backslashes = 0
                      end
                  end
                )
              | .chars
              | implode;
            def mask_fenced_ticks:
              split("\n")
              | reduce .[] as $line (
                  {lines: [], in_fence: false};
                  ($line | fence_line) as $is_fence
                  | if .in_fence then
                      .lines += [($line | gsub("`"; " "))]
                      | if $is_fence then .in_fence = false else . end
                    elif $is_fence then
                      .lines += [($line | gsub("`"; " "))]
                      | .in_fence = true
                    else
                      .lines += [($line | mask_escaped_ticks)]
                    end
                )
              | .lines
              | join("\n");
            def without_unclosed_inline_code:
              . as $content
              | ($content | mask_fenced_ticks) as $inline_content
              | ($inline_content | [scan("`")] | length) as $ticks
              | if ($ticks % 2) == 1 then
                  (($inline_content | rindex("`")) // ($content | length)) as $cut
                  | $content[0:$cut]
                else
                  $content
                end;
            def remove_at($index; $size):
              .[0:$index] + .[($index + $size):];
            def without_unclosed_marker($marker):
              ((split($marker) | length) - 1) as $count
              | if ($count % 2) == 1 then
                  (rindex($marker) // length) as $index
                  | remove_at($index; ($marker | length))
                else
                  .
                end;
            def without_unclosed_link:
              . as $content
              | (($content | rindex("[")) // -1) as $label_open
              | (($content | rindex("]")) // -1) as $label_close
              | if $label_open > $label_close then
                  $content[0:$label_open]
                else
                  (($content | rindex("](")) // -1) as $destination_open
                  | (($content | rindex(")")) // -1) as $destination_close
                  | if $destination_open > $destination_close then
                      (
                        ($content[0:$destination_open] | rindex("["))
                        // $destination_open
                      ) as $link_open
                      | $content[0:$link_open]
                    else
                      $content
                    end
                end;
            def without_unclosed_autolink:
              . as $content
              | (($content | rindex("<")) // -1) as $open
              | (($content | rindex(">")) // -1) as $close
              | if $open > $close then $content[0:$open] else $content end;
            def non_code_safe:
              without_unclosed_link
              | without_unclosed_autolink
              | without_unclosed_marker("**")
              | without_unclosed_marker("__")
              | without_unclosed_marker("~~")
              | without_unclosed_marker("*")
              | sub("[ \n]+$"; "");
            def with_ellipsis:
              if test("(^|\n)[ \t]*`{3,}[ \t]*$") then
                . + "\n..."
              else
                (sub("\\.+$"; "")) + "..."
              end;
            def markdown_safe:
              without_unclosed_fence
              | without_unclosed_inline_code
              | sub("[ \n]+$"; "");
            def word_or_paragraph_prefix($body; $limit):
              (
                $body
                | complete_paragraphs($limit)
                | without_trailing_heading
                | markdown_safe
              ) as $paragraphs
              | if ($paragraphs | length) > 0 then
                  $paragraphs
                else
                  $body | word_prefix($limit) | markdown_safe | non_code_safe
                end;
            def bounded($limit):
              . as $body
              | if ($body | length) <= $limit then
                  $body
                else
                  ($limit - 4) as $content_limit
                  | word_or_paragraph_prefix($body; $content_limit) as $prefix
                  | if ($prefix | length) > 0 then
                      $prefix | with_ellipsis
                    else
                      "..."
                    end
                end;
            def summary:
              (. // "" | normalized) as $body
              | if ($body | length) == 0 then
                  "_No description provided._"
                else
                  $body | bounded(700) | gsub(heading_marker; "")
                end;
            {
              username: "GitHub Issues",
              allowed_mentions: {parse: []},
              embeds: [{
                title: (
                  .issue.title
                  | if length > 256 then .[0:253] + "..." else . end
                ),
                url: .issue.html_url,
                description: (.issue.body | summary),
                color: 5814783,
                author: {
                  name: ("Opened by @" + .issue.user.login),
                  url: .issue.user.html_url,
                  icon_url: .issue.user.avatar_url
                },
                fields: [{
                  name: "Issue",
                  value: (
                    "[Open issue #" + (.issue.number | tostring) + "](" +
                    .issue.html_url + ")"
                  ),
                  inline: false
                }],
                footer: {text: $repository}
              }]
            }
          ' "$GITHUB_EVENT_PATH" > discord-payload.json

      - name: Send Discord announcement
        env:
          DISCORD_ISSUE_WEBHOOK_URL: ${{ secrets.DISCORD_ISSUE_WEBHOOK_URL }}
        run: |
          if [ -z "$DISCORD_ISSUE_WEBHOOK_URL" ]; then
            echo "::error::DISCORD_ISSUE_WEBHOOK_URL is not configured"
            exit 1
          fi

          curl --fail-with-body --silent --show-error \
            --header 'Content-Type: application/json' \
            --data-binary @discord-payload.json \
            "$DISCORD_ISSUE_WEBHOOK_URL"
