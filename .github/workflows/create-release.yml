# FoundryVTT Module Release Workflow
# Manual trigger only - run with: gh workflow run create-release.yml -f version=1.0.2

name: Create Release

'on':
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.0.2)'
        required: true
        type: string
      release_title:
        description: 'Release title (default: v<version>)'
        required: false
        type: string
      release_description:
        description: 'Release description/shoutbox (prepended to changelog)'
        required: false
        type: string

env:
  MODULE_ID: simulacrum

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Generate release bot token
        id: release-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.RELEASE_APP_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          permission-contents: write

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main
          token: ${{ steps.release-token.outputs.token }}
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Set version
        id: version
        run: echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT

      - name: Convert README to HTML description
        run: |
          npm install -g marked
          REPO_RAW="https://raw.githubusercontent.com/${{ github.repository }}/main"
          cat README.md | \
            sed '/^\[!\[/d' | \
            sed "s|](docs/|](${REPO_RAW}/docs/|g" | \
            sed "s|src=\"docs/|src=\"${REPO_RAW}/docs/|g" \
            > readme_processed.md
          marked readme_processed.md > readme.html
          sed -i '0,/<h1[^>]*>.*<\/h1>/s///' readme.html
          cat readme.html | tr '\n' ' ' | sed 's/  */ /g' > readme_single.html
          rm -f readme_processed.md

      - name: Update module.json version
        run: |
          VERSION=${{ steps.version.outputs.version }}
          REPO_URL="https://github.com/${{ github.repository }}"
          README_HTML=$(cat readme_single.html)
          jq --arg ver "$VERSION" \
             --arg manifest "${REPO_URL}/releases/download/${VERSION}/module.json" \
             --arg download "${REPO_URL}/releases/download/${VERSION}/${MODULE_ID}.zip" \
             --arg desc "$README_HTML" \
             '.version = $ver | .manifest = $manifest | .download = $download | .description = $desc' \
             module.json > module.json.tmp && mv module.json.tmp module.json
          echo "Updated module.json:"
          cat module.json | jq '.version, .manifest, .download'
          rm -f readme.html readme_single.html

      - name: Build compendium packs
        run: npm run build:packs

      - name: Create module zip
        run: |
          mkdir -p dist/${{ env.MODULE_ID }}
          cp -r assets dist/${{ env.MODULE_ID }}/
          cp -r lang dist/${{ env.MODULE_ID }}/
          cp -r packs dist/${{ env.MODULE_ID }}/
          cp -r scripts dist/${{ env.MODULE_ID }}/
          cp -r styles dist/${{ env.MODULE_ID }}/
          cp -r templates dist/${{ env.MODULE_ID }}/
          cp module.json dist/${{ env.MODULE_ID }}/
          cp README.md dist/${{ env.MODULE_ID }}/
          cp LICENSE dist/${{ env.MODULE_ID }}/ 2>/dev/null || true
          cd dist
          zip -r ${{ env.MODULE_ID }}.zip ${{ env.MODULE_ID }}
          mv ${{ env.MODULE_ID }}.zip ../
          cp ${{ env.MODULE_ID }}/module.json ../module.json.release
          cd ..
          mv module.json.release module.json

      - name: Version changelog entry
        env:
          INPUT_RELEASE_TITLE: ${{ inputs.release_title }}
        run: |
          VERSION=${{ steps.version.outputs.version }}
          if grep -q "^## \[Unreleased\]" CHANGELOG.md; then
            sed -i "s/^## \[Unreleased\].*$/## [${VERSION}] - $(date -u +%Y-%m-%d)/" CHANGELOG.md
            echo "Versioned [Unreleased] entry to [${VERSION}]"
          elif ! grep -q "^## \[${VERSION}\]" CHANGELOG.md; then
            echo "::error::CHANGELOG.md is missing both [Unreleased] and [${VERSION}] entry"
            exit 1
          fi
          TITLE="$INPUT_RELEASE_TITLE"
          if [ -z "$TITLE" ]; then
            TITLE="v${VERSION}"
          fi
          echo "RELEASE_TITLE=$TITLE" >> "$GITHUB_ENV"

      - name: Prepare release body
        env:
          RELEASE_DESCRIPTION: ${{ inputs.release_description }}
        run: |
          VERSION=${{ steps.version.outputs.version }}
          awk -v version="$VERSION" '
            $0 == "## [" version "]" || index($0, "## [" version "] - ") == 1 { found=1; next }
            found && /^## \[/ { exit }
            found { print }
          ' CHANGELOG.md > changelog.txt
          if [ -n "$RELEASE_DESCRIPTION" ]; then
            { printf '%s\n\n' "$RELEASE_DESCRIPTION"; cat changelog.txt; } > release_body.md
          else
            cp changelog.txt release_body.md
          fi
          echo "Release body:"
          cat release_body.md

      - name: Get release bot user id
        id: bot-user
        run: |
          echo "user-id=$(gh api "/users/${{ steps.release-token.outputs.app-slug }}[bot]" --jq .id)" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ steps.release-token.outputs.token }}

      - name: Commit release updates and create tag
        run: |
          VERSION=${{ steps.version.outputs.version }}
          BOT_NAME="${{ steps.release-token.outputs.app-slug }}[bot]"
          BOT_EMAIL="${{ steps.bot-user.outputs.user-id }}+${{ steps.release-token.outputs.app-slug }}[bot]@users.noreply.github.com"
          COMMIT_SHA=$(git rev-parse HEAD)

          update_file() {
            local path="$1"
            local message="$2"

            FILE_SHA=$(gh api "/repos/${{ github.repository }}/contents/${path}" \
              --field ref=main \
              --jq .sha)

            jq -n \
              --arg message "$message" \
              --arg content "$(base64 -w 0 "$path")" \
              --arg sha "$FILE_SHA" \
              --arg branch "main" \
              --arg name "$BOT_NAME" \
              --arg email "$BOT_EMAIL" \
              '{
                message: $message,
                content: $content,
                sha: $sha,
                branch: $branch,
                committer: {name: $name, email: $email},
                author: {name: $name, email: $email}
              }' > "/tmp/update-${path//\//-}.json"

            COMMIT_SHA=$(gh api "/repos/${{ github.repository }}/contents/${path}" \
              --method PUT \
              --input "/tmp/update-${path//\//-}.json" \
              --jq .commit.sha)
          }

          if ! git diff --quiet CHANGELOG.md; then
            update_file "CHANGELOG.md" "docs(release): changelog for ${VERSION} [skip ci]"
          else
            echo "No CHANGELOG.md changes to commit"
          fi

          if ! git diff --quiet module.json; then
            update_file "module.json" "docs(release): module.json for ${VERSION} [skip ci]"
          else
            echo "No module.json changes to commit"
          fi

          TAG_SHA=$(gh api /repos/${{ github.repository }}/git/tags \
            --method POST \
            --field "tag=${VERSION}" \
            --field "message=Release ${VERSION}" \
            --field "object=${COMMIT_SHA}" \
            --field "type=commit" \
            --jq .sha)

          gh api /repos/${{ github.repository }}/git/refs \
            --method POST \
            --field "ref=refs/tags/${VERSION}" \
            --field "sha=${TAG_SHA}"
        env:
          GH_TOKEN: ${{ steps.release-token.outputs.token }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: ${{ env.RELEASE_TITLE }}
          body_path: release_body.md
          files: |
            module.json
            ${{ env.MODULE_ID }}.zip
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ steps.release-token.outputs.token }}

      - name: Publish to Foundry VTT
        env:
          FVTT_TOKEN: ${{ secrets.FOUNDRY_RELEASE_TOKEN }}
        run: |
          OUTPUT=$(npx @ghost-fvtt/foundry-publish \
            --manifestPath module.json \
            --manifestURL "https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.version }}/module.json" 2>&1) || {
            if echo "$OUTPUT" | grep -q "already exists"; then
              echo "Version already published to Foundry VTT, skipping"
              exit 0
            else
              echo "$OUTPUT"
              exit 1
            fi
          }

      - name: Announce on Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then
            echo "Discord webhook not configured, skipping announcement"
            exit 0
          fi
          VERSION=${{ steps.version.outputs.version }}
          REPO_URL="https://github.com/${{ github.repository }}"
          RELEASE_URL="${REPO_URL}/releases/tag/${VERSION}"
          # Discord field value limit is 1024 chars - truncate by lines until under limit
          SUFFIX=$'\n'"[See full release notes](${RELEASE_URL})"
          MAX_CHARS=$((1024 - ${#SUFFIX} - 10))
          CHANGELOG=$(cat changelog.txt)
          while [ ${#CHANGELOG} -gt $MAX_CHARS ]; do
            # Drop the last line and append truncation notice
            CHANGELOG=$(echo "$CHANGELOG" | head -n -1)
          done
          if [ ${#CHANGELOG} -lt $(wc -c < changelog.txt) ]; then
            CHANGELOG="${CHANGELOG}${SUFFIX}"
          fi

          # Build JSON payload with proper escaping using jq
          PAYLOAD=$(jq -n \
            --arg title "Simulacrum v${VERSION} Released!" \
            --arg url "$RELEASE_URL" \
            --arg desc "A new version of Simulacrum: AI Campaign Copilot is now available!" \
            --arg changes "$CHANGELOG" \
            --arg install "Update from Foundry VTT or [GitHub](${RELEASE_URL})" \
            '{
              embeds: [{
                title: $title,
                url: $url,
                color: 14206924,
                description: $desc,
                fields: [
                  {name: "Changes", value: $changes},
                  {name: "Install", value: $install}
                ],
                footer: {text: "Simulacrum: AI Campaign Copilot"}
              }]
            }')

          echo "Payload: $PAYLOAD"
          HTTP_CODE=$(curl -s -o /tmp/discord_response.txt -w "%{http_code}" -H "Content-Type: application/json" -X POST -d "$PAYLOAD" "$DISCORD_WEBHOOK_URL")
          BODY=$(cat /tmp/discord_response.txt)
          echo "Response ($HTTP_CODE): $BODY"
          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "::error::Discord announcement failed with HTTP $HTTP_CODE"
            exit 1
          fi
